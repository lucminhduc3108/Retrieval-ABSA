model_name: microsoft/deberta-v3-base
num_bio_labels: 3
num_sent_labels: 3
lambda_cls: 0.5
dropout: 0.1
batch_size: 4
epochs: 10
lr: 2.0e-5
encoder_lr: 2.0e-6
head_lr: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
max_seq_length: 512
query_budget: 100
grad_clip: 1.0
patience: 5
seed: 42
bio_path: data/processed/bio_tagging.jsonl
val_ratio: 0.2
ckpt_dir: checkpoints/absa_focal
log_path: logs/absa_focal.jsonl
cls_class_weights: null
grad_accum_steps: 1
split_bio: false
bio_max_length: 128
cls_loss_type: focal
focal_gamma: 2.0
