model_name: microsoft/deberta-v3-base
num_sent_labels: 3
embed_dim: 64
tau: 0.5
use_retrieval: true
batch_size: 32
epochs: 20
encoder_lr: 2.0e-6
head_lr: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
max_seq_length: 256
dropout: 0.1
grad_clip: 1.0
patience: 7
seed: 42
val_ratio: 0.2
ckpt_dir: checkpoints/stage2
log_path: logs/stage2_training.jsonl
sentiment_path: data/processed/sentiment_records.jsonl
grad_accum_steps: 1
